<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Preview del portale SDF per il monitoraggio dei KPI della rete concessionari." />
    <title>SDF Network Performance</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%23f36a15'/%3E%3Cpath d='M16 19h32v8H25v5h20v8H25v5h23v8H16z' fill='%23fff'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css?v=19" />
    <link rel="stylesheet" href="/design-overrides.css?v=14" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Vai al contenuto</a>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Navigazione principale">
        <div class="brand">
          <img class="brand-logo" src="/assets/sdf-logo-secondary.png" alt="SDF" />
          <span class="brand-copy">Network<br />Performance</span>
        </div>

        <nav class="primary-nav">
          <p class="nav-label">Overview</p>
          <button class="nav-item is-active" data-page="overview"><span class="static-icon" aria-hidden="true"><img src="/assets/menu-1.svg" alt="" /></span>Overview</button>
          <button class="nav-item" data-page="dealers"><span class="static-icon" aria-hidden="true"><img src="/assets/menu-2.svg" alt="" /></span>Concessionari</button>
          <button class="nav-item" data-page="analysis"><span class="static-icon" aria-hidden="true"><img src="/assets/menu-3.svg" alt="" /></span>Analisi KPI</button>
          <button class="nav-item" data-page="surveys"><span class="static-icon" aria-hidden="true"><img src="/assets/menu-5.svg" alt="" /></span>Rilevazioni</button>
          <button class="nav-item" data-page="reports"><span class="static-icon" aria-hidden="true"><img src="/assets/menu-6.svg" alt="" /></span>Report</button>
          <button class="nav-item" data-page="help"><span class="static-icon" aria-hidden="true"><img src="/assets/menu-4.svg" alt="" /></span>Centro assistenza</button>
        </nav>

        <div class="sidebar-bottom">
          <div class="campaign-card">
            <div class="campaign-label"><span class="live-dot"></span>Campagna attiva</div>
            <strong>Rilevazione 1 — 2026</strong>
            <div class="campaign-progress"><span style="width: 75%"></span></div>
            <small>48 di 64 concessionari</small>
          </div>
          <button class="user-card" aria-label="Apri profilo utente">
            <span class="avatar">D</span>
            <span><strong>Daniele</strong><small>JET · Amministratore</small></span>
            <span data-icon="chevron"></span>
          </button>
        </div>
      </aside>

      <div class="app-main">
        <header class="topbar">
          <button class="icon-button menu-button" id="menu-button" aria-label="Apri menu" aria-expanded="false" aria-controls="sidebar"><span data-icon="headerMenu"></span></button>
          <div class="topbar-context"><span>Portale KPI rete concessionari</span><strong id="mobile-page-title">Overview</strong></div>
          <button class="topbar-command" type="button" data-global-action="search" aria-haspopup="dialog" aria-controls="global-search-dialog">
            <span data-icon="headerSearch"></span>
            <span>Cerca concessionario, KPI o report</span>
            <kbd>⌘ K</kbd>
          </button>
          <div class="topbar-actions">
            <label class="demo-role-control" id="demo-role-control">Vista demo
              <select id="demo-role-select" aria-label="Seleziona vista demo"><option value="JET">Vista JET</option><option value="SDF">Vista SDF</option></select>
            </label>
            <button class="icon-button" aria-label="Notifiche"><span data-icon="headerBell"></span><span class="notification-dot"></span></button>
            <button class="icon-button" id="help-center-button" aria-label="Apri Centro assistenza"><span data-icon="headerHelp"></span></button>
            <button class="topbar-user" type="button"><span class="avatar">D</span><span><strong>Daniele</strong><small>JET Admin</small></span></button>
          </div>
        </header>
        <div class="app-demo-banner" role="note">Ambiente dimostrativo — tutti i dati visualizzati sono fittizi</div>
        <main id="main-content" tabindex="-1"></main>
      </div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <dialog class="global-search-dialog" id="global-search-dialog" aria-labelledby="global-search-title">
      <div class="global-search-head">
        <span data-icon="search" aria-hidden="true"></span>
        <label class="sr-only" for="global-search-input" id="global-search-title">Cerca nel portale</label>
        <input id="global-search-input" type="search" role="combobox" aria-autocomplete="list" aria-controls="global-search-results" aria-expanded="true" placeholder="Cerca concessionario, KPI o sezione" autocomplete="off" />
        <button type="button" id="global-search-close" aria-label="Chiudi ricerca">Esc</button>
      </div>
      <div class="global-search-results" id="global-search-results" role="listbox" aria-live="polite"></div>
      <footer class="global-search-footer"><span><kbd>↑</kbd><kbd>↓</kbd> per navigare</span><span><kbd>Invio</kbd> per aprire</span></footer>
    </dialog>
    <script src="/app.js?v=6"></script>
    <script src="/portal.js?v=14"></script>
  </body>
</html>
