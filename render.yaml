services:
  - type: web
    name: sdf-network-performance
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: COLLECTION_MODE
        value: proprietary
      - key: DEMO_VIEW_SWITCHER
        value: "true"
      - key: APP_PUBLIC_URL
        value: https://sdf-network-performance.onrender.com
      - key: DEALER_LINK_SECRET
        generateValue: true
